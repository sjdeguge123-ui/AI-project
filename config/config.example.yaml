# VidGrab 配置文件示例
# 复制本文件为 config.yaml，填入你的配置

# AI 服务配置（选填一个即可）
ai:
  # 推荐使用 DeepSeek（国内外可用，有免费额度）
  provider: deepseek          # 可选: deepseek / openai / claude / gemini / qwen
  api_key: "sk-your-key-here" # 填入你的 API Key
  model: "deepseek-chat"      # 默认模型，可不填

# 语音转录配置（无字幕视频时使用）
whisper:
  mode: api                   # api（云端）或 local（本地）
  api_key: ""                 # 使用 api 模式时填 OpenAI Key
  local_model: "base"         # 使用 local 模式时的模型大小: tiny/base/small/medium/large

# 输出配置
output:
  language: auto              # auto（跟随视频语言）/ zh（中文）/ en（英文）
  default_format: markdown    # 默认导出格式: markdown / pdf / word / image
  save_path: ""               # 导出文件保存路径，留空则保存到桌面
